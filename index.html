<!DOCTYPE html>
<html>
<head>
  <title>Auxara AI</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    #chatbox {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 320px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      overflow: hidden;
    }

    #header {
      background: #4CAF50;
      color: white;
      padding: 12px;
      font-weight: bold;
    }

    #messages {
      height: 300px;
      overflow-y: auto;
      padding: 10px;
      font-size: 14px;
    }

    .user {
      text-align: right;
      margin: 5px 0;
    }

    .ai {
      text-align: left;
      margin: 5px 0;
    }

    .bubble {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 10px;
      max-width: 80%;
    }

    .user .bubble {
      background: #4CAF50;
      color: white;
    }

    .ai .bubble {
      background: #eee;
    }

    #inputArea {
      display: flex;
      border-top: 1px solid #ddd;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #4CAF50;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="chatbox">
  <div id="header">Auxara AI Receptionist</div>

  <div id="messages">
    <div class="ai">
      <div class="bubble">
        Hi 👋 Looking to book a dental appointment or have a question?
      </div>
    </div>
  </div>

  <div id="inputArea">
    <input id="input" placeholder="Type message..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const input = document.getElementById("input");

// 🔥 ENTER KEY SUPPORT
input.addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    sendMessage();
  }
});

async function sendMessage() {
  const message = input.value.trim();
  if (!message) return;

  const messages = document.getElementById("messages");

  // User message
  messages.innerHTML += `
    <div class="user">
      <div class="bubble">${message}</div>
    </div>
  `;

  input.value = "";

  const res = await fetch("http://localhost:3000/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message })
  });

  const data = await res.json();

  // AI reply
  messages.innerHTML += `
    <div class="ai">
      <div class="bubble">${data.reply}</div>
    </div>
  `;

  messages.scrollTop = messages.scrollHeight;
}
</script>

</body>
</html>
