<!DOCTYPE html>
<html>
<head>
  <title>Auxara AI</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: transparent;
    }

    #chatbox {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 100%;
      max-width: 350px;
      height: 500px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      background: linear-gradient(135deg, #4CAF50, #2e7d32);
      color: white;
      padding: 14px;
      font-weight: 600;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #status {
      width: 8px;
      height: 8px;
      background: #00ff88;
      border-radius: 50%;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 6px;
      font-size: 14px;
      background: #fafafa;
    }

    .user, .ai {
      display: flex;
    }

    .user {
      justify-content: flex-end;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 14px;
      max-width: 75%;
      line-height: 1.4;
      animation: fadeIn 0.2s ease;
    }

    .user .bubble {
      background: #4CAF50;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .ai .bubble {
      background: #eaeaea;
      color: #333;
      border-bottom-left-radius: 4px;
    }

    #inputArea {
      display: flex;
      border-top: 1px solid #eee;
      padding: 8px;
      background: white;
    }

    input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
      font-size: 14px;
    }

    button {
      margin-left: 6px;
      padding: 10px 14px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #43a047;
    }

    .dot {
      height: 6px;
      width: 6px;
      margin: 0 2px;
      background-color: #999;
      border-radius: 50%;
      display: inline-block;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<div id="chatbox">
  <div id="header">
    <div id="status"></div>
    Smart Dental Assistant
  </div>

  <div id="messages">
    <div class="ai">
      <div class="bubble">
        👋 Hi! I can help you book a dental appointment instantly.
      </div>
    </div>
  </div>

  <div id="inputArea">
    <input id="input" placeholder="Type your message..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const input = document.getElementById("input");
const messages = document.getElementById("messages");

const BACKEND = "https://auxara-ai.onrender.com";

// 🔥 GET CLINIC NAME FROM URL
const urlParams = new URLSearchParams(window.location.search);
const clinic = urlParams.get("clinic") || "unknown";

// 🧠 SESSION ID
let sessionId = null;

// CREATE SESSION
async function initSession() {
  try {
    const res = await fetch(`${BACKEND}/session`, {
      method: "POST"
    });
    const data = await res.json();
    sessionId = data.sessionId;
  } catch (err) {
    console.error("Session error:", err);
  }
}

initSession();

// ENTER KEY
input.addEventListener("keypress", function(e) {
  if (e.key === "Enter") sendMessage();
});

async function sendMessage() {
  const message = input.value.trim();
  if (!message) return;

  if (!sessionId) {
    await initSession();
  }

  // USER MESSAGE
  messages.innerHTML += `
    <div class="user">
      <div class="bubble">${message}</div>
    </div>
  `;

  input.value = "";
  messages.scrollTop = messages.scrollHeight;

  // TYPING ANIMATION
  const typing = document.createElement("div");
  typing.className = "ai";
  typing.innerHTML = `
    <div class="bubble">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  `;
  messages.appendChild(typing);

  try {
    const res = await fetch(`${BACKEND}/chat`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message,
        clinic,
        sessionId
      })
    });

    const data = await res.json();
    typing.remove();

    messages.innerHTML += `
      <div class="ai">
        <div class="bubble">${data.reply}</div>
      </div>
    `;

    messages.scrollTop = messages.scrollHeight;

  } catch (err) {
    typing.remove();
    messages.innerHTML += `
      <div class="ai">
        <div class="bubble">Something went wrong. Try again.</div>
      </div>
    `;
  }
}
</script>

</body>
</html>
